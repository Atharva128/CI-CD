name: Manual Docker Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:v${{ github.run_number }} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:v${{ github.run_number }}
